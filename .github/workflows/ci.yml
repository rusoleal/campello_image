name: CI

# Run on every push and every pull-request, across all branches.
on:
  push:
  pull_request:

jobs:

  # ---------------------------------------------------------------------------
  # Universal tests — no GPU required.
  # Decodes embedded PNG and WebP byte arrays, checks dimensions and format.
  # Runs on macOS, Linux, and Windows using the platform's native toolchain.
  # ---------------------------------------------------------------------------
  universal-tests:
    name: Universal tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: macOS
          - os: ubuntu-latest
            name: Linux
          - os: windows-latest
            name: Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --target campello_image_universal_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure -R campello_image_universal_tests

  # ---------------------------------------------------------------------------
  # iOS build check — compile for the iOS simulator (arm64, no code signing).
  # No tests are executed: there is no test runner without a connected device.
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build check (iOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Configure (iOS simulator)
        run: |
          cmake -B build \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build
        run: cmake --build build --config Release

  # ---------------------------------------------------------------------------
  # Android build check — cross-compile the library with the NDK.
  # No tests are executed: running on-device tests requires a connected device.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build check (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure (arm64-v8a, API 28)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build
